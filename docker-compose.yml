services:
  postgres:
    image: postgres:16-alpine
    container_name: evomi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evomi
      POSTGRES_PASSWORD: evomi
      POSTGRES_DB: evomi
    ports:
      - "5432:5432"
    volumes:
      - evomi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evomi -d evomi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  evomi_pg_data:
